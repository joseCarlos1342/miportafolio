<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Portafolio de José Carlos Gómez R.</title>
  <desc id="desc">Tarjeta social del portafolio profesional de José Carlos Gómez R., ingeniero de software Full-Stack.</desc>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap');
      .font-inter {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
    </style>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#030712" />
      <stop offset="0.54" stop-color="#071527" />
      <stop offset="1" stop-color="#001a35" />
    </linearGradient>
    <radialGradient id="glowTop" cx="50%" cy="0%" r="72%">
      <stop offset="0" stop-color="#2997ff" stop-opacity="0.46" />
      <stop offset="0.48" stop-color="#0066cc" stop-opacity="0.16" />
      <stop offset="1" stop-color="#0066cc" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glowBottom" cx="50%" cy="100%" r="64%">
      <stop offset="0" stop-color="#60a5fa" stop-opacity="0.24" />
      <stop offset="1" stop-color="#60a5fa" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.13" />
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.045" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="26" flood-color="#000000" flood-opacity="0.38" />
    </filter>
    
    <!-- Logo gradients from favicon -->
    <linearGradient id="logoBg" x1="18" y1="12" x2="110" y2="116" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0b1528" />
      <stop offset="0.58" stop-color="#020817" />
      <stop offset="1" stop-color="#01040a" />
    </linearGradient>
    <radialGradient id="logoGlow" cx="64" cy="64" r="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2997ff" stop-opacity="0.25" />
      <stop offset="1" stop-color="#2997ff" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="logoJGrad" x1="60" y1="34" x2="36" y2="80" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2997ff" />
      <stop offset="1" stop-color="#0066cc" />
    </linearGradient>
    <linearGradient id="logoCGrad" x1="92" y1="38" x2="70" y2="90" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00f2fe" />
      <stop offset="1" stop-color="#3ecf8e" />
    </linearGradient>
    <filter id="logoNeonShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0066cc" flood-opacity="0.35" />
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#glowTop)" />
  <rect width="1200" height="630" fill="url(#glowBottom)" />
  <path d="M84 94 H1116" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1" />
  <path d="M84 536 H1116" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1" />
  <path d="M908 40 L1180 312" stroke="#ffffff" stroke-opacity="0.06" stroke-width="2" />
  <path d="M956 34 L1228 306" stroke="#ffffff" stroke-opacity="0.04" stroke-width="2" />
  <path d="M-90 536 C132 460 284 574 498 512 C734 444 896 400 1290 474 L1290 630 L-90 630 Z" fill="#2997ff" opacity="0.08" />

  <g filter="url(#shadow)">
    <rect x="96" y="82" width="1008" height="466" rx="44" fill="url(#panel)" stroke="#ffffff" stroke-opacity="0.14" />
  </g>

  <!-- Stylized Branding Logo from favicon.svg -->
  <g transform="translate(550 112) scale(0.78125)">
    <rect width="128" height="128" rx="36" fill="url(#logoBg)" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1" />
    <rect width="128" height="128" rx="36" fill="url(#logoGlow)" />
    <g filter="url(#logoNeonShadow)">
      <!-- "J" Path -->
      <path d="M 60 34 L 60 76 Q 60 90, 48 90 Q 36 90, 36 76" 
            fill="none" 
            stroke="url(#logoJGrad)" 
            stroke-width="9" 
            stroke-linecap="round" 
            stroke-linejoin="round" />
      <!-- "C" Path -->
      <path d="M 92 38 Q 70 38, 70 64 Q 70 90, 92 90" 
            fill="none" 
            stroke="url(#logoCGrad)" 
            stroke-width="9" 
            stroke-linecap="round" 
            stroke-linejoin="round" />
    </g>
  </g>

  <!-- Clean, beautifully spaced text elements using class for Inter font -->
  <text x="600" y="260" text-anchor="middle" fill="#8cc8ff" class="font-inter" font-size="20" font-weight="800">FULL-STACK SOFTWARE ENGINEER</text>
  <text x="600" y="342" text-anchor="middle" fill="#ffffff" class="font-inter" font-size="64" font-weight="800">José Carlos Gómez R.</text>
  <text x="600" y="398" text-anchor="middle" fill="#d7e7ff" class="font-inter" font-size="26" font-weight="500">React · Next.js · Python · PostgreSQL · Supabase</text>

  <!-- Pill group for areas of expertise -->
  <g transform="translate(330 436)">
    <rect width="540" height="54" rx="27" fill="#020817" fill-opacity="0.58" stroke="#ffffff" stroke-opacity="0.1" />
    <circle cx="42" cy="27" r="6" fill="#28c840" />
    <text x="62" y="34" fill="#ffffff" fill-opacity="0.78" class="font-inter" font-size="18" font-weight="700">Seguridad</text>
    <circle cx="204" cy="27" r="6" fill="#7dd3fc" />
    <text x="224" y="34" fill="#ffffff" fill-opacity="0.78" class="font-inter" font-size="18" font-weight="700">Tiempo real</text>
    <circle cx="390" cy="27" r="6" fill="#f0abfc" />
    <text x="410" y="34" fill="#ffffff" fill-opacity="0.78" class="font-inter" font-size="18" font-weight="700">Datos</text>
  </g>

  <text x="600" y="525" text-anchor="middle" fill="#ffffff" fill-opacity="0.58" class="font-inter" font-size="20" font-weight="600">portafoliojosecarlos.com</text>
</svg>
