<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Portafolio de José Carlos Gómez R.</title>
  <desc id="desc">Tarjeta social del portafolio profesional de José Carlos Gómez R., ingeniero de software Full-Stack.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#030712" />
      <stop offset="0.54" stop-color="#071527" />
      <stop offset="1" stop-color="#001a35" />
    </linearGradient>
    <radialGradient id="glowTop" cx="50%" cy="0%" r="72%">
      <stop offset="0" stop-color="#2997ff" stop-opacity="0.46" />
      <stop offset="0.48" stop-color="#0066cc" stop-opacity="0.16" />
      <stop offset="1" stop-color="#0066cc" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glowBottom" cx="50%" cy="100%" r="64%">
      <stop offset="0" stop-color="#60a5fa" stop-opacity="0.24" />
      <stop offset="1" stop-color="#60a5fa" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.13" />
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.045" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="26" flood-color="#000000" flood-opacity="0.38" />
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#glowTop)" />
  <rect width="1200" height="630" fill="url(#glowBottom)" />
  <path d="M84 94 H1116" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1" />
  <path d="M84 536 H1116" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1" />
  <path d="M908 40 L1180 312" stroke="#ffffff" stroke-opacity="0.06" stroke-width="2" />
  <path d="M956 34 L1228 306" stroke="#ffffff" stroke-opacity="0.04" stroke-width="2" />
  <path d="M-90 536 C132 460 284 574 498 512 C734 444 896 400 1290 474 L1290 630 L-90 630 Z" fill="#2997ff" opacity="0.08" />

  <g filter="url(#shadow)">
    <rect x="96" y="82" width="1008" height="466" rx="44" fill="url(#panel)" stroke="#ffffff" stroke-opacity="0.14" />
  </g>

  <g transform="translate(600 145)">
    <rect x="-47" y="-47" width="94" height="94" rx="27" fill="#ffffff" fill-opacity="0.1" stroke="#ffffff" stroke-opacity="0.18" />
    <text x="0" y="13" text-anchor="middle" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" letter-spacing="-1.7">JCG</text>
  </g>

  <text x="600" y="250" text-anchor="middle" fill="#8cc8ff" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" letter-spacing="5">FULL-STACK SOFTWARE ENGINEER</text>
  <text x="600" y="340" text-anchor="middle" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="78" font-weight="800" letter-spacing="-4">José Carlos Gómez R.</text>
  <text x="600" y="400" text-anchor="middle" fill="#d7e7ff" font-family="Inter, Arial, sans-serif" font-size="31" font-weight="500" letter-spacing="-0.8">React · Next.js · Python · PostgreSQL · Supabase</text>

  <g transform="translate(330 438)">
    <rect width="540" height="54" rx="27" fill="#020817" fill-opacity="0.58" stroke="#ffffff" stroke-opacity="0.1" />
    <circle cx="40" cy="27" r="6" fill="#28c840" />
    <text x="62" y="35" fill="#ffffff" fill-opacity="0.78" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">Seguridad</text>
    <circle cx="204" cy="27" r="6" fill="#7dd3fc" />
    <text x="226" y="35" fill="#ffffff" fill-opacity="0.78" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">Tiempo real</text>
    <circle cx="390" cy="27" r="6" fill="#f0abfc" />
    <text x="412" y="35" fill="#ffffff" fill-opacity="0.78" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">Datos</text>
  </g>

  <text x="600" y="530" text-anchor="middle" fill="#ffffff" fill-opacity="0.58" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="600">portafoliojosecarlos.com</text>
