<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="JCG">
  <defs>
    <linearGradient id="bg" x1="18" y1="12" x2="110" y2="116" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0b1528" />
      <stop offset="0.58" stop-color="#020817" />
      <stop offset="1" stop-color="#01040a" />
    </linearGradient>
    <radialGradient id="glow" cx="64" cy="64" r="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2997ff" stop-opacity="0.25" />
      <stop offset="1" stop-color="#2997ff" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="jGrad" x1="60" y1="34" x2="36" y2="80" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2997ff" />
      <stop offset="1" stop-color="#0066cc" />
    </linearGradient>
    <linearGradient id="cGrad" x1="92" y1="38" x2="70" y2="90" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00f2fe" />
      <stop offset="1" stop-color="#3ecf8e" />
    </linearGradient>
    <filter id="neonShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0066cc" flood-opacity="0.35" />
    </filter>
  </defs>
  
  <!-- Outer squircle frame -->
  <rect width="128" height="128" rx="36" fill="url(#bg)" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1" />
  <rect width="128" height="128" rx="36" fill="url(#glow)" />
  
  <g filter="url(#neonShadow)">
    <!-- "J" Path: Sleek vertical stem hooking left -->
    <path d="M 60 34 L 60 76 Q 60 90, 48 90 Q 36 90, 36 76" 
          fill="none" 
          stroke="url(#jGrad)" 
          stroke-width="9" 
          stroke-linecap="round" 
          stroke-linejoin="round" />
          
    <!-- "C" Path: Open curve on the right -->
    <path d="M 92 38 Q 70 38, 70 64 Q 70 90, 92 90" 
          fill="none" 
          stroke="url(#cGrad)" 
          stroke-width="9" 
          stroke-linecap="round" 
          stroke-linejoin="round" />
  </g>
</svg>
