name: Bug report
description: Report a bug or issue with the portfolio
title: "[BUG] "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior.
      value: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened.
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser
      description: Browser and version (e.g., Chrome 125, Safari 17).
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      description: Operating system (e.g., macOS 14, Ubuntu 24.04).
    validations:
      required: true
